name: CD Dev

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "infra/**"
      - ".github/workflows/cd-dev.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus
  ENVIRONMENT_NAME: dev

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify function_app.py is importable
        run: python -c "import function_app"

      - name: Run tests
        run: pytest tests -q

  deploy:
    runs-on: ubuntu-latest
    environment: dev
    needs: test-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment sub create \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters environmentName=$ENVIRONMENT_NAME aiDeploymentName=gpt-4o

      - name: Deploy Function App code
        uses: Azure/functions-action@v1
        with:
          app-name: func-dont-lie-to-me-dev
          package: src/backend
          scm-do-build-during-deployment: true
          enable-oryx-build: true

  validate-deployment:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run infrastructure validation
        run: |
          chmod +x infra/tests/validate_deployment.sh
          ENVIRONMENT_NAME=dev bash infra/tests/validate_deployment.sh

      - name: Smoke test health endpoint
        run: |
          FUNC_URL="https://func-dont-lie-to-me-dev.azurewebsites.net"
          curl -sf "$FUNC_URL/api/health" || echo "Health check skipped (may need function key)"