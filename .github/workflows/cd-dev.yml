name: CD Dev

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "infra/**"
      - ".github/workflows/cd-dev.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: australiaeast
  ENVIRONMENT_NAME: dev

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install -r requirements.txt
          pip install pytest

      - name: Verify function_app.py is importable
        run: python -c "import function_app"

      - name: Run tests
        run: pytest tests -q

  deploy:
    runs-on: ubuntu-latest
    environment: dev
    needs: test-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate resource group region (immutable)
        run: |
          RG_NAME="dont_lie_to_me"
          if az group exists --name "$RG_NAME" | grep -qi true; then
            ACTUAL_LOCATION=$(az group show --name "$RG_NAME" --query location -o tsv)
            if [ "$ACTUAL_LOCATION" != "$AZURE_LOCATION" ]; then
              echo "Resource group '$RG_NAME' already exists in '$ACTUAL_LOCATION'."
              echo "Azure resource group location is immutable."
              echo "Recreate '$RG_NAME' in '$AZURE_LOCATION' or use a new resource group name."
              exit 1
            fi
          fi

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment sub create \
            --name "main-${AZURE_LOCATION}-${ENVIRONMENT_NAME}" \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters environmentName=$ENVIRONMENT_NAME location=$AZURE_LOCATION aiDeploymentName=gpt-4o createRoleAssignments=false

      - name: Deploy Function App code
        uses: Azure/functions-action@v1
        with:
          app-name: func-dont-lie-to-me-dev
          package: src/backend
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Verify PYTHONPATH app setting is applied
        run: |
          PY=$(az functionapp config appsettings list \
            --name func-dont-lie-to-me-dev \
            --resource-group dont_lie_to_me \
            --query "[?name=='PYTHONPATH'].value" -o tsv)
          echo "PYTHONPATH on Azure: $PY"
          FLAGS=$(az functionapp config appsettings list \
            --name func-dont-lie-to-me-dev \
            --resource-group dont_lie_to_me \
            --query "[?name=='AzureWebJobsFeatureFlags'].value" -o tsv)
          echo "AzureWebJobsFeatureFlags on Azure: $FLAGS"

      - name: Sync function triggers (REST)
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          az rest --method post \
            --url "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/dont_lie_to_me/providers/Microsoft.Web/sites/func-dont-lie-to-me-dev/syncfunctiontriggers?api-version=2022-03-01"

      - name: Restart function app after deployment
        run: |
          az functionapp restart \
            --name func-dont-lie-to-me-dev \
            --resource-group dont_lie_to_me
          echo "Waiting 30s for cold start after restart..."
          sleep 30

      - name: Inspect deployed functions (diagnostic)
        run: |
          az functionapp function list \
            --name func-dont-lie-to-me-dev \
            --resource-group dont_lie_to_me \
            --query "[].name" -o tsv
          FUNCTION_COUNT=$(az functionapp function list \
            --name func-dont-lie-to-me-dev \
            --resource-group dont_lie_to_me \
            --query "length(@)" -o tsv)
          echo "Discovered function count: ${FUNCTION_COUNT}"
          if [ "${FUNCTION_COUNT}" = "0" ]; then
            echo "No functions were indexed by the runtime."
            echo "Key Function App settings:"
            az functionapp config appsettings list \
              --name func-dont-lie-to-me-dev \
              --resource-group dont_lie_to_me \
              --query "[?name=='FUNCTIONS_WORKER_RUNTIME' || name=='FUNCTIONS_EXTENSION_VERSION' || name=='AzureWebJobsFeatureFlags' || name=='PYTHONPATH' || name=='SCM_DO_BUILD_DURING_DEPLOYMENT' || name=='ENABLE_ORYX_BUILD' || name=='WEBSITE_RUN_FROM_PACKAGE'].{name:name,value:value}" -o table || true
            echo "Latest deployment records:"
            az webapp log deployment list \
              --name func-dont-lie-to-me-dev \
              --resource-group dont_lie_to_me \
              --query "[0:5].[id,status,author,message,end_time]" -o table || true
            echo "Host runtime status (admin API):"
            MASTER_KEY=$(az functionapp keys list \
              --name func-dont-lie-to-me-dev \
              --resource-group dont_lie_to_me \
              --query masterKey -o tsv || true)
            if [ -n "$MASTER_KEY" ]; then
              curl -sS "https://func-dont-lie-to-me-dev.azurewebsites.net/admin/host/status" \
                -H "x-functions-key: $MASTER_KEY" || true
              echo
              echo "Indexed functions from admin API:"
              curl -sS "https://func-dont-lie-to-me-dev.azurewebsites.net/admin/functions" \
                -H "x-functions-key: $MASTER_KEY" || true
              echo
            else
              echo "Could not retrieve function app master key for admin diagnostics."
            fi
            echo "Recent runtime exceptions from Application Insights:"
            az extension add --name application-insights --only-show-errors || true
            AI_NAME=$(az resource list \
              --resource-group dont_lie_to_me \
              --resource-type "microsoft.insights/components" \
              --query "[0].name" -o tsv || true)
            if [ -n "$AI_NAME" ]; then
              az monitor app-insights query \
                --app "$AI_NAME" \
                --analytics-query "exceptions | where timestamp > ago(30m) | project timestamp, type, outerMessage, problemId | take 20" \
                -o table || true
              az monitor app-insights query \
                --app "$AI_NAME" \
                --analytics-query "traces | where timestamp > ago(30m) and (message contains 'Worker' or message contains 'index' or message contains 'function_app' or message contains 'ImportError' or message contains 'ModuleNotFoundError') | project timestamp, severityLevel, message | take 30" \
                -o table || true
            else
              echo "Application Insights component not found in resource group."
            fi
            exit 1
          fi

  validate-deployment:
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run infrastructure validation
        run: |
          chmod +x infra/tests/validate_deployment.sh
          ENVIRONMENT_NAME=dev bash infra/tests/validate_deployment.sh

      - name: Smoke test health endpoint
        run: |
          FUNC_URL="https://func-dont-lie-to-me-dev.azurewebsites.net"
          for attempt in $(seq 1 12); do
            success=0
            for path in /api/health /health; do
              status=$(curl -sS -L -o response_body.txt -w "%{http_code}" "$FUNC_URL$path" || true)
              body=$(cat response_body.txt)
              if [ "$status" = "200" ]; then
                python -c "import json,sys; d=json.loads(sys.argv[1]); assert d.get('status') == 'ok', f'Health check failed: {d}'" "$body"
                echo "Dev health endpoint is ready at $path"
                success=1
                break
              fi
              echo "Attempt $attempt/12 path=$path status=$status body=$body"
            done
            if [ "$success" -eq 1 ]; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Dev smoke test failed after retries. No healthy endpoint found at /api/health or /health."
              echo "Discovered functions:"
              az functionapp function list \
                --name func-dont-lie-to-me-dev \
                --resource-group dont_lie_to_me \
                --query "[].name" -o tsv || true
              echo "Latest deployment records:"
              az webapp log deployment list \
                --name func-dont-lie-to-me-dev \
                --resource-group dont_lie_to_me \
                --query "[0:5].[id,status,author,message,end_time]" -o table || true
              echo "Host runtime status (admin API):"
              MASTER_KEY=$(az functionapp keys list \
                --name func-dont-lie-to-me-dev \
                --resource-group dont_lie_to_me \
                --query masterKey -o tsv || true)
              if [ -n "$MASTER_KEY" ]; then
                curl -sS "https://func-dont-lie-to-me-dev.azurewebsites.net/admin/host/status" \
                  -H "x-functions-key: $MASTER_KEY" || true
                echo
                echo "Indexed functions from admin API:"
                curl -sS "https://func-dont-lie-to-me-dev.azurewebsites.net/admin/functions" \
                  -H "x-functions-key: $MASTER_KEY" || true
                echo
              else
                echo "Could not retrieve function app master key for admin diagnostics."
              fi
              echo "Recent runtime exceptions from Application Insights:"
              az extension add --name application-insights --only-show-errors || true
              AI_NAME=$(az resource list \
                --resource-group dont_lie_to_me \
                --resource-type "microsoft.insights/components" \
                --query "[0].name" -o tsv || true)
              if [ -n "$AI_NAME" ]; then
                az monitor app-insights query \
                  --app "$AI_NAME" \
                  --analytics-query "exceptions | where timestamp > ago(30m) | project timestamp, type, outerMessage, problemId | take 20" \
                  -o table || true
                az monitor app-insights query \
                  --app "$AI_NAME" \
                  --analytics-query "traces | where timestamp > ago(30m) and (message contains 'Worker' or message contains 'index' or message contains 'function_app' or message contains 'ImportError' or message contains 'ModuleNotFoundError') | project timestamp, severityLevel, message | take 30" \
                  -o table || true
              else
                echo "Application Insights component not found in resource group."
              fi
              echo "Function App state:"
              az functionapp show \
                --name func-dont-lie-to-me-dev \
                --resource-group dont_lie_to_me \
                --query "{state:state, defaultHostName:defaultHostName, linuxFxVersion:siteConfig.linuxFxVersion}" -o jsonc || true
              exit 1
            fi
            sleep 15
          done