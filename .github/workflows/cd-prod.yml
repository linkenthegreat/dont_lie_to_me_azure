name: CD Production (Blue-Green)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: australiaeast
  ENVIRONMENT_NAME: prod

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install -r requirements.txt
          pip install pytest

      - name: Verify function_app.py is importable
        run: python -c "import function_app"

      - name: Run tests
        run: pytest tests -q

  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Validate Bicep compiles
        run: az bicep build --file infra/main.bicep

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: [test-backend, validate-bicep]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate resource group region (immutable)
        run: |
          RG_NAME="dont_lie_to_me"
          if az group exists --name "$RG_NAME" | grep -qi true; then
            ACTUAL_LOCATION=$(az group show --name "$RG_NAME" --query location -o tsv)
            if [ "$ACTUAL_LOCATION" != "$AZURE_LOCATION" ]; then
              echo "Resource group '$RG_NAME' already exists in '$ACTUAL_LOCATION'."
              echo "Azure resource group location is immutable."
              echo "Use a new environment/resource group name or recreate the resource group in '$AZURE_LOCATION'."
              exit 1
            fi
          fi

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment sub create \
            --name "main-${AZURE_LOCATION}-${ENVIRONMENT_NAME}" \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters environmentName=$ENVIRONMENT_NAME location=$AZURE_LOCATION aiDeploymentName=gpt-4o createRoleAssignments=false

      - name: Deploy to staging slot
        uses: Azure/functions-action@v1
        with:
          app-name: func-dont-lie-to-me-prod
          slot-name: staging
          package: src/backend
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Inspect deployed functions (diagnostic)
        run: |
          az functionapp function list \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --slot staging \
            --query "[].name" -o tsv

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://func-dont-lie-to-me-prod-staging.azurewebsites.net"
          echo "Running smoke tests against $STAGING_URL..."
          HEALTH_PATH=""
          for path in /api/health /health; do
            status=$(curl -sS -L -o response_body.txt -w "%{http_code}" "$STAGING_URL$path" || true)
            if [ "$status" = "200" ]; then
              HEALTH_PATH="$path"
              break
            fi
          done
          if [ -z "$HEALTH_PATH" ]; then
            echo "No healthy endpoint found at /api/health or /health on staging slot."
            echo "This usually means functions were not loaded by the host."
            exit 1
          fi
          echo "Using health path: $HEALTH_PATH"
          for attempt in $(seq 1 12); do
            status=$(curl -sS -L -o response_body.txt -w "%{http_code}" "$STAGING_URL$HEALTH_PATH" || true)
            body=$(cat response_body.txt)
            if [ "$status" = "200" ]; then
              python -c "import json,sys; d=json.loads(sys.argv[1]); assert d.get('status') == 'ok', f'Health check failed: {d}'" "$body" && break
            fi
            echo "Attempt $attempt/12: health endpoint not ready yet (status=$status)."
            if [ -n "$body" ]; then
              echo "$body"
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Staging smoke test failed after retries."
              exit 1
            fi
            sleep 15
          done
          echo "Smoke tests passed!"

  swap-to-production:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging to production
        run: |
          az webapp deployment slot swap \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --slot staging \
            --target-slot production

      - name: Verify production health
        run: |
          PROD_URL="https://func-dont-lie-to-me-prod.azurewebsites.net"
          echo "Verifying production health..."
          HEALTH_PATH=""
          for path in /api/health /health; do
            status=$(curl -sS -L -o response_body.txt -w "%{http_code}" "$PROD_URL$path" || true)
            if [ "$status" = "200" ]; then
              HEALTH_PATH="$path"
              break
            fi
          done
          if [ -z "$HEALTH_PATH" ]; then
            echo "No healthy endpoint found at /api/health or /health on production slot."
            exit 1
          fi
          echo "Using health path: $HEALTH_PATH"
          for attempt in $(seq 1 12); do
            status=$(curl -sS -L -o response_body.txt -w "%{http_code}" "$PROD_URL$HEALTH_PATH" || true)
            body=$(cat response_body.txt)
            if [ "$status" = "200" ]; then
              python -c "import json,sys; d=json.loads(sys.argv[1]); assert d.get('status') == 'ok', f'Production health check failed: {d}'" "$body" && break
            fi
            echo "Attempt $attempt/12: production health endpoint not ready yet (status=$status)."
            if [ -n "$body" ]; then
              echo "$body"
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Production smoke test failed after retries."
              exit 1
            fi
            sleep 15
          done
          echo "Production deployment verified!"

  validate-infrastructure:
    runs-on: ubuntu-latest
    environment: production
    needs: swap-to-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run infrastructure validation
        run: |
          chmod +x infra/tests/validate_deployment.sh
          ENVIRONMENT_NAME=prod bash infra/tests/validate_deployment.sh
