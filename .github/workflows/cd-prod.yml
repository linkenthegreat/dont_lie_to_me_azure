name: CD Production (Blue-Green)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus
  ENVIRONMENT_NAME: prod

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify function_app.py is importable
        run: python -c "import function_app"

      - name: Run tests
        run: pytest tests -q

  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Validate Bicep compiles
        run: az bicep build --file infra/main.bicep

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: [test-backend, validate-bicep]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment sub create \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters environmentName=$ENVIRONMENT_NAME aiDeploymentName=gpt-4o

      - name: Deploy to staging slot
        uses: Azure/functions-action@v1
        with:
          app-name: func-dont-lie-to-me-prod
          slot-name: staging
          package: src/backend
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://func-dont-lie-to-me-prod-staging.azurewebsites.net"
          echo "Running smoke tests against $STAGING_URL..."
          curl -sf "$STAGING_URL/api/health" | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'Health check failed: {d}'"
          echo "Smoke tests passed!"

  swap-to-production:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging to production
        run: |
          az webapp deployment slot swap \
            --name func-dont-lie-to-me-prod \
            --resource-group rg-dont-lie-to-me-prod \
            --slot staging \
            --target-slot production

      - name: Verify production health
        run: |
          PROD_URL="https://func-dont-lie-to-me-prod.azurewebsites.net"
          echo "Verifying production health..."
          curl -sf "$PROD_URL/api/health" | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', f'Production health check failed: {d}'"
          echo "Production deployment verified!"

  validate-infrastructure:
    runs-on: ubuntu-latest
    needs: swap-to-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run infrastructure validation
        run: |
          chmod +x infra/tests/validate_deployment.sh
          ENVIRONMENT_NAME=prod bash infra/tests/validate_deployment.sh
