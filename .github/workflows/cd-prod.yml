name: CD Production (Blue-Green)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: australiaeast
  ENVIRONMENT_NAME: prod
  SHARED_KEYVAULT_NAME: dontlietome-kv
  AZURE_CORE_OUTPUT: json
  ENABLE_KV_SECRET_SEED: "false"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install -r requirements.txt
          pip install pytest

      - name: Verify function_app.py is importable
        run: python -c "import function_app"

      - name: Run tests
        run: pytest tests -q

  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Validate Bicep compiles
        run: az bicep build --file infra/main.bicep

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: [test-backend, validate-bicep]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate resource group region (immutable)
        run: |
          RG_NAME="dont_lie_to_me"
          if az group exists --name "$RG_NAME" | grep -qi true; then
            ACTUAL_LOCATION=$(az group show --name "$RG_NAME" --query location -o tsv)
            if [ "$ACTUAL_LOCATION" != "$AZURE_LOCATION" ]; then
              echo "Resource group '$RG_NAME' already exists in '$ACTUAL_LOCATION'."
              echo "Azure resource group location is immutable."
              echo "Use a new environment/resource group name or recreate the resource group in '$AZURE_LOCATION'."
              exit 1
            fi
          fi

      - name: Deploy infrastructure (Bicep)
        run: |
          # createRoleAssignments=false: the CD service principal only has Contributor, not Owner/UAA.
          # The Key Vault Secrets User role assignment for the Function App managed identity
          # must be created once manually (see docs/setup.md) or by granting the SP
          # User Access Administrator on the resource group and switching back to true.
          az deployment sub create \
            --name "main-${AZURE_LOCATION}-${ENVIRONMENT_NAME}" \
            --location $AZURE_LOCATION \
            --template-file infra/main.bicep \
            --parameters environmentName=$ENVIRONMENT_NAME location=$AZURE_LOCATION aiDeploymentName=gpt-4o createRoleAssignments=false

      - name: Derive Key Vault info from deployment outputs (prod)
        run: |
          DEPLOYMENT_NAME="main-${AZURE_LOCATION}-${ENVIRONMENT_NAME}"
          KEYVAULT_URL=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query "properties.outputs.keyVaultUrl.value" -o tsv)
          if [ -z "$KEYVAULT_URL" ]; then
            echo "Failed to read keyVaultUrl from deployment outputs."
            exit 1
          fi
          KEYVAULT_NAME=$(echo "$KEYVAULT_URL" | sed -E 's#https://([^./]+)\..*#\1#')

          # Optional override: use one shared Key Vault across environments.
          # Configure GitHub secret AZURE_SHARED_KEYVAULT_NAME (e.g. dontlietome-kv) to enable.
          SHARED_KV_NAME="$SHARED_KEYVAULT_NAME"
          if [ -n "$SHARED_KV_NAME" ]; then
            KEYVAULT_NAME="$SHARED_KV_NAME"
            KEYVAULT_URL="https://${KEYVAULT_NAME}.vault.azure.net/"
            echo "Using shared Key Vault override: $KEYVAULT_NAME"
          fi

          echo "KEYVAULT_URL=$KEYVAULT_URL" >> "$GITHUB_ENV"
          echo "KEYVAULT_NAME=$KEYVAULT_NAME" >> "$GITHUB_ENV"
          echo "Key Vault: $KEYVAULT_NAME ($KEYVAULT_URL)"

      - name: Seed Key Vault Azure AI API key secret (prod)
        # Requires 'Key Vault Secrets Officer' on the Key Vault.
        # If the SP lacks this role, seed the secret manually once and this step is skipped.
        # To grant: az role assignment create --role "Key Vault Secrets Officer"
        #   --assignee-object-id <SP_OID> --scope <KV_RESOURCE_ID>
        continue-on-error: true
        run: |
          if [ "$ENABLE_KV_SECRET_SEED" != "true" ]; then
            echo "Skipping Key Vault secret seeding (ENABLE_KV_SECRET_SEED=$ENABLE_KV_SECRET_SEED)."
            exit 0
          fi
          az keyvault secret set \
            --vault-name "$KEYVAULT_NAME" \
            --name AzureAIApiKey \
            --value "${{ secrets.AZURE_AI_API_KEY }}" >/dev/null
          echo "AzureAIApiKey seeded successfully."

      - name: Configure Function App AI settings (staging, Key Vault refs)
        run: |
          az functionapp config appsettings set \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --slot staging \
            --settings \
              AI_PROVIDER=azure \
              AZURE_KEYVAULT_URL="$KEYVAULT_URL" \
              AZURE_AI_API_KEY_SECRET_NAME=AzureAIApiKey \
              AZURE_AI_ENDPOINT="${{ secrets.AZURE_AI_ENDPOINT }}" \
              AZURE_AI_API_KEY="@Microsoft.KeyVault(VaultName=${KEYVAULT_NAME};SecretName=AzureAIApiKey)" \
              GOOGLE_SAFE_BROWSING_API_KEY="@Microsoft.KeyVault(VaultName=${KEYVAULT_NAME};SecretName=GoogleSafeBrowsingApiKey)" \
              URLHAUS_API_KEY="@Microsoft.KeyVault(VaultName=${KEYVAULT_NAME};SecretName=UrlhausApiKey)"

      - name: Setup Python for deployment package
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages for deployment
        run: |
          pip install -r src/backend/requirements.txt \
            --target src/backend/.python_packages/lib/site-packages \
            --upgrade --quiet

      - name: Deploy to staging slot
        uses: Azure/functions-action@v1
        with:
          app-name: func-dont-lie-to-me-prod
          slot-name: staging
          package: src/backend
          scm-do-build-during-deployment: false
          respect-funcignore: true

      - name: Verify PYTHONPATH app setting is applied (staging)
        run: |
          PY=$(az functionapp config appsettings list \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --slot staging \
            --query "[?name=='PYTHONPATH'].value" -o tsv)
          echo "PYTHONPATH on Azure (staging): $PY"
          FLAGS=$(az functionapp config appsettings list \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --slot staging \
            --query "[?name=='AzureWebJobsFeatureFlags'].value" -o tsv)
          echo "AzureWebJobsFeatureFlags on Azure (staging): $FLAGS"

      - name: Sync function triggers (staging, REST)
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          az rest --method post \
            --url "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/dont_lie_to_me/providers/Microsoft.Web/sites/func-dont-lie-to-me-prod/slots/staging/syncfunctiontriggers?api-version=2022-03-01"

      - name: Restart staging slot after deployment
        run: |
          az functionapp restart \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --slot staging
          echo "Waiting 30s for cold start after restart..."
          sleep 30

      - name: Inspect deployed functions (diagnostic)
        run: |
          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          az rest --method get \
            --url "https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/dont_lie_to_me/providers/Microsoft.Web/sites/func-dont-lie-to-me-prod/slots/staging/functions?api-version=2022-03-01" \
            --query "value[].name" -o tsv

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://func-dont-lie-to-me-prod-staging.azurewebsites.net"
          echo "Running smoke tests against $STAGING_URL..."
          for attempt in $(seq 1 12); do
            success=0
            for path in /api/health /health; do
              status=$(curl -sS -L -o response_body.txt -w "%{http_code}" "$STAGING_URL$path" || true)
              body=$(cat response_body.txt)
              if [ "$status" = "200" ]; then
                python -c "import json,sys; d=json.loads(sys.argv[1]); assert d.get('status') == 'ok', f'Health check failed: {d}'" "$body"
                echo "Staging health endpoint is ready at $path"
                success=1
                break
              fi
              echo "Attempt $attempt/12 path=$path status=$status body=$body"
            done
            if [ "$success" -eq 1 ]; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Staging smoke test failed after retries. No healthy endpoint found at /api/health or /health."
              exit 1
            fi
            sleep 15
          done
          echo "Smoke tests passed!"

  swap-to-production:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging to production
        run: |
          az webapp deployment slot swap \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --slot staging \
            --target-slot production

      - name: Derive Key Vault info from deployment outputs (prod/swap job)
        run: |
          DEPLOYMENT_NAME="main-${AZURE_LOCATION}-${ENVIRONMENT_NAME}"
          KEYVAULT_URL=$(az deployment sub show --name "$DEPLOYMENT_NAME" --query "properties.outputs.keyVaultUrl.value" -o tsv)
          if [ -z "$KEYVAULT_URL" ]; then
            echo "Failed to read keyVaultUrl from deployment outputs in swap job."
            exit 1
          fi
          KEYVAULT_NAME=$(echo "$KEYVAULT_URL" | sed -E 's#https://([^./]+)\..*#\1#')

          # Optional override: use one shared Key Vault across environments.
          SHARED_KV_NAME="$SHARED_KEYVAULT_NAME"
          if [ -n "$SHARED_KV_NAME" ]; then
            KEYVAULT_NAME="$SHARED_KV_NAME"
            KEYVAULT_URL="https://${KEYVAULT_NAME}.vault.azure.net/"
            echo "Using shared Key Vault override in swap job: $KEYVAULT_NAME"
          fi

          echo "KEYVAULT_URL=$KEYVAULT_URL" >> "$GITHUB_ENV"
          echo "KEYVAULT_NAME=$KEYVAULT_NAME" >> "$GITHUB_ENV"
          echo "Key Vault (swap job): $KEYVAULT_NAME ($KEYVAULT_URL)"

      - name: Configure Function App AI settings (production, Key Vault refs)
        run: |
          # Production is the root app (no --slot flag); there is no slot named "production"
          az functionapp config appsettings set \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --settings \
              AI_PROVIDER=azure \
              AZURE_KEYVAULT_URL="$KEYVAULT_URL" \
              AZURE_AI_API_KEY_SECRET_NAME=AzureAIApiKey \
              AZURE_AI_ENDPOINT="${{ secrets.AZURE_AI_ENDPOINT }}" \
              AZURE_AI_API_KEY="@Microsoft.KeyVault(VaultName=${KEYVAULT_NAME};SecretName=AzureAIApiKey)" \
              GOOGLE_SAFE_BROWSING_API_KEY="@Microsoft.KeyVault(VaultName=${KEYVAULT_NAME};SecretName=GoogleSafeBrowsingApiKey)" \
              URLHAUS_API_KEY="@Microsoft.KeyVault(VaultName=${KEYVAULT_NAME};SecretName=UrlhausApiKey)"

      - name: Configure Function App CORS for SWA origin (production)
        run: |
          az functionapp cors add \
            --name func-dont-lie-to-me-prod \
            --resource-group dont_lie_to_me \
            --allowed-origins "https://orange-tree-0244f1300.4.azurestaticapps.net"

      - name: Verify production health
        run: |
          PROD_URL="https://func-dont-lie-to-me-prod.azurewebsites.net"
          echo "Verifying production health..."
          for attempt in $(seq 1 12); do
            success=0
            for path in /api/health /health; do
              status=$(curl -sS -L -o response_body.txt -w "%{http_code}" "$PROD_URL$path" || true)
              body=$(cat response_body.txt)
              if [ "$status" = "200" ]; then
                python -c "import json,sys; d=json.loads(sys.argv[1]); assert d.get('status') == 'ok', f'Production health check failed: {d}'" "$body"
                echo "Production health endpoint is ready at $path"
                success=1
                break
              fi
              echo "Attempt $attempt/12 path=$path status=$status body=$body"
            done
            if [ "$success" -eq 1 ]; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "Production smoke test failed after retries. No healthy endpoint found at /api/health or /health."
              exit 1
            fi
            sleep 15
          done
          echo "Production deployment verified!"

  validate-infrastructure:
    runs-on: ubuntu-latest
    environment: production
    needs: swap-to-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run infrastructure validation
        run: |
          chmod +x infra/tests/validate_deployment.sh
          ENVIRONMENT_NAME=prod bash infra/tests/validate_deployment.sh
