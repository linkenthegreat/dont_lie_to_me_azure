<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Primary SEO -->
    <title>Don't Lie To Me — AI Scam Detector</title>
    <meta name="description" content="Protect yourself from scams, phishing, and fraud. Paste suspicious messages, URLs, or images and get instant AI-powered analysis to verify if it's a scam." />
    <meta name="keywords" content="scam detection, phishing, fraud prevention, AI security, scam checker, anti-scam, message verification, URL checker" />
    <meta name="author" content="Don't Lie To Me Team" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Don't Lie To Me — AI-Powered Scam Detection" />
    <meta property="og:description" content="Protect yourself from scams, phishing, and fraud. Paste suspicious messages, URLs, or images for instant AI-powered verification." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="500" />
    <meta property="og:image:height" content="500" />
    <meta property="og:image:alt" content="Don't Lie To Me — Lady Justice blindfolded" />
    <meta property="og:site_name" content="Don't Lie To Me" />
    <meta property="og:locale" content="en_AU" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Don't Lie To Me — AI-Powered Scam Detection" />
    <meta name="twitter:description" content="Paste suspicious messages, URLs, or images and get instant AI-powered scam analysis." />
    <meta name="twitter:image" content="/og-image.png" />
    <meta name="twitter:image:alt" content="Don't Lie To Me — Lady Justice blindfolded" />

    <!-- Theme & Mobile -->
    <meta name="theme-color" content="#8A2BE2" />
    <meta name="color-scheme" content="light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scam Detector" />
    <meta name="application-name" content="Scam Detector" />
    <meta name="msapplication-TileColor" content="#8A2BE2" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Canonical -->
    <base href="/" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link href="DontLieToMe.Web.styles.css" rel="stylesheet" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Don't Lie To Me",
        "description": "AI-Powered Scam Detection — Protect yourself from scams, phishing, and fraud with instant AI analysis.",
        "applicationCategory": "SecurityApplication",
        "operatingSystem": "Any",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "AUD"
        },
        "creator": {
            "@type": "Organization",
            "name": "Don't Lie To Me Team"
        }
    }
    </script>
</head>

<body>
    <div id="app">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;background:#FFFFFF;">
            <img src="icon-192.png" alt="Don't Lie To Me" style="width:80px;height:80px;border-radius:16px;margin-bottom:16px;" />
            <div style="font-size:1.5rem;font-weight:700;color:#8A2BE2;margin-bottom:8px;">Don't Lie To Me</div>
            <div style="font-size:0.85rem;color:#666;margin-bottom:24px;">AI-Powered Scam Detection</div>
            <div style="width:40px;height:40px;border:3px solid #e0e0e0;border-top:3px solid #8A2BE2;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
        </div>
    </div>

    <noscript>
        <div style="text-align:center;padding:40px;font-family:system-ui,sans-serif;">
            <h1>Don't Lie To Me</h1>
            <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
        </div>
    </noscript>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#x2715;</a>
    </div>
    <script src="js/interop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
